    html, body {

    }

    /* Grid container */
    .grid-wrapper {
   
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      grid-auto-rows: 250px;
      grid-auto-flow: dense;
    }

    /* Grid item spans */
   

    /* Each figure is a grid item */
    figure {
      margin: 0;
      border-radius: 5px;
      overflow: hidden;
      border: 2px solid #190329;
      background: #2a1f46;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    figure img {
      width: 100%;
      height: auto;
      object-fit: cover;
      flex-grow: 1;
      display: block;
      border-bottom: 1px solid #190329;
    }

    figcaption {
      padding: 8px 10px;
      background-color: #200b30;
      color: white;
      font-size: 2.5vh;
      text-align: center;
      flex-shrink: 0;
    }
  
</style>>
